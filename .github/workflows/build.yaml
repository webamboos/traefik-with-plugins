name: Build and Push Docker Image to GHCR
on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build_arch:
    name: Build and push ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/traefik-with-plugins
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load version variables
        run: |
          set -a
          source .env
          set +a
          echo "TRAEFIK_REPO=${TRAEFIK_REPO}" >> $GITHUB_ENV
          echo "TRAEFIK_VERSION=${TRAEFIK_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_MODSECURITY_REPO=${PLUGIN_MODSECURITY_REPO}" >> $GITHUB_ENV
          echo "PLUGIN_MODSECURITY_VERSION=${PLUGIN_MODSECURITY_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_REALIP_REPO=${PLUGIN_REALIP_REPO}" >> $GITHUB_ENV
          echo "PLUGIN_REALIP_VERSION=${PLUGIN_REALIP_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_GEOBLOCK_REPO=${PLUGIN_GEOBLOCK_REPO}" >> $GITHUB_ENV
          echo "PLUGIN_GEOBLOCK_VERSION=${PLUGIN_GEOBLOCK_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_CROWDSEC_REPO=${PLUGIN_CROWDSEC_REPO}" >> $GITHUB_ENV
          echo "PLUGIN_CROWDSEC_VERSION=${PLUGIN_CROWDSEC_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_SABLIER_REPO=${PLUGIN_SABLIER_REPO}" >> $GITHUB_ENV
          echo "PLUGIN_SABLIER_VERSION=${PLUGIN_SABLIER_VERSION}" >> $GITHUB_ENV

      - name: Extract metadata (labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: ./traefik
          file: ./traefik/dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/${{ matrix.arch }}
          provenance: false
          sbom: false
          build-args: |
            TRAEFIK_REPO=${{ env.TRAEFIK_REPO }}
            TRAEFIK_VERSION=${{ env.TRAEFIK_VERSION }}
            PLUGIN_MODSECURITY_REPO=${{ env.PLUGIN_MODSECURITY_REPO }}
            PLUGIN_MODSECURITY_VERSION=${{ env.PLUGIN_MODSECURITY_VERSION }}
            PLUGIN_REALIP_REPO=${{ env.PLUGIN_REALIP_REPO }}
            PLUGIN_REALIP_VERSION=${{ env.PLUGIN_REALIP_VERSION }}
            PLUGIN_GEOBLOCK_REPO=${{ env.PLUGIN_GEOBLOCK_REPO }}
            PLUGIN_GEOBLOCK_VERSION=${{ env.PLUGIN_GEOBLOCK_VERSION }}
            PLUGIN_CROWDSEC_REPO=${{ env.PLUGIN_CROWDSEC_REPO }}
            PLUGIN_CROWDSEC_VERSION=${{ env.PLUGIN_CROWDSEC_VERSION }}
            PLUGIN_SABLIER_REPO=${{ env.PLUGIN_SABLIER_REPO }}
            PLUGIN_SABLIER_VERSION=${{ env.PLUGIN_SABLIER_VERSION }}

  create_manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build_arch
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      packages: write
      id-token: write
      attestations: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/traefik-with-plugins
      TAG: ${{ github.ref_name }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        id: manifest
        run: |
          AMD64_IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}-amd64"
          ARM64_IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}-arm64"
          TARGET_IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"

          docker manifest create ${TARGET_IMAGE} \
            --amend ${AMD64_IMAGE} \
            --amend ${ARM64_IMAGE}

          DIGEST=$(docker manifest push ${TARGET_IMAGE})
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Cleanup arch-specific tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          PKG_NAME="traefik-with-plugins"

          # Determine if owner is an org or a user
          if gh api "/orgs/${OWNER}" > /dev/null 2>&1; then
            ENDPOINT="/orgs/${OWNER}/packages/container/${PKG_NAME}/versions"
          else
            ENDPOINT="/users/${OWNER}/packages/container/${PKG_NAME}/versions"
          fi

          # Find and delete package versions tagged with the arch-specific tags
          VERSION_IDS=$(gh api "${ENDPOINT}" --paginate --jq \
            ".[] | select(.metadata.container.tags[] | test(\"${TAG}-(amd64|arm64)\$\")) | .id")

          if [ -z "$VERSION_IDS" ]; then
            echo "No arch-specific tags found to cleanup."
            exit 0
          fi

          for VERSION_ID in $VERSION_IDS; do
            echo "Deleting package version ${VERSION_ID}"
            gh api --method DELETE "${ENDPOINT}/${VERSION_ID}"
          done

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: create_manifest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Load versions and generate release notes
        id: release_notes
        run: |
          source .env
          chmod +x scripts/generate-release-notes.sh

          # Extract Docker tag from GitHub ref (e.g., refs/tags/v1.0.0 -> v1.0.0)
          DOCKER_TAG=${GITHUB_REF#refs/tags/}
          echo "Docker tag: $DOCKER_TAG"

          RELEASE_NOTES=$(./scripts/generate-release-notes.sh .env "$DOCKER_TAG")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Set version info for release title
          echo "traefik_version=${TRAEFIK_VERSION}" >> $GITHUB_OUTPUT
          echo "plugin_count=5" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Traefik ${{ steps.release_notes.outputs.traefik_version }} with ${{ steps.release_notes.outputs.plugin_count }} Embedded Plugins"
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
